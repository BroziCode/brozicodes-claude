name: Bundle MCP Server

on:
  push:
    branches: [main]
    paths:
      - 'servers/brozicode/src/**'
      - 'servers/brozicode/test/**'
      - 'servers/brozicode/bench/**'
      - 'servers/brozicode/package.json'

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install
        working-directory: servers/brozicode

      - name: Run regression tests
        run: npm test
        working-directory: servers/brozicode

      - name: Token A/B benchmark (guards headline reduction claim)
        run: npm run bench
        working-directory: servers/brozicode

      - name: Build bundle
        run: npm run build
        working-directory: servers/brozicode

      - name: Commit bundle if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add servers/brozicode/bundle.js
          git diff --staged --quiet || git commit -m "build: auto-bundle [skip ci]"
          git push
